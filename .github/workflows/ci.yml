name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 5s
          --name ci-postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
      - name: Assert ephemeral PostgreSQL capacity
        run: |
          docker exec ci-postgres psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "ALTER SYSTEM SET max_connections = 200"
          docker restart ci-postgres
          for attempt in {1..30}; do
            if docker exec ci-postgres pg_isready -U postgres -d postgres; then break; fi
            sleep 1
          done
          max_connections="$(docker exec ci-postgres psql -U postgres -d postgres -Atc 'SHOW max_connections')"
          test "$max_connections" -ge 120
          printf 'ephemeral PostgreSQL max_connections=%s\n' "$max_connections"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check types
        run: pnpm ts-check
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Run unit tests
        env:
          AUTOMATION_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          AUTOMATION_TEST_DATABASE_ACK: ephemeral
        run: pnpm exec vitest run
      - name: Check server bundle
        run: node --check dist/server.js
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run end-to-end tests
        run: pnpm test:e2e
      - name: Create and verify release artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_ID: ${{ github.repository_id }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          release_id="r${RUN_ID}-a${RUN_ATTEMPT}-${COMMIT_SHA:0:12}"
          bash scripts/create-release.sh \
            "$release_id" "$COMMIT_SHA" "$REPOSITORY_ID" "$REPOSITORY" "$RUN_ID" "$RUN_ATTEMPT"
          bash scripts/verify-release.sh \
            "release-artifacts/peilv-$release_id.tar.gz" \
            "release-artifacts/peilv-$release_id.tar.gz.sha256"
      - name: Upload release artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: peilv-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            release-artifacts/*.tar.gz
            release-artifacts/*.tar.gz.sha256
            release-artifacts/release-manifest-*.json
          if-no-files-found: error
          retention-days: 30
      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 3

  host-tcb-linux-real-semantics:
    name: Host TCB Linux real filesystem semantics
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify original bootstrap on Linux root metadata and fsync semantics
        run: |
          set -Eeuo pipefail
          test "$RUNNER_OS" = Linux
          test "$(id -u)" != 0
          command -v sudo visudo flock sha256sum
          sudo env PATH="$PATH" VITEST_INCLUDE_LINUX=1 pnpm exec vitest run tests/deploy-v3-bootstrap-linux.test.ts --maxWorkers=1 --minWorkers=1 --reporter=verbose

  host-tcb-effective-sudoers:
    name: Host TCB effective sudoers exact ABI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Verify nested includes aliases and effective grants
        run: |
          set -Eeuo pipefail
          test "$RUNNER_OS" = Linux
          command -v sudo visudo
          sudo bash tests/effective-sudoers-linux.sh

  host-tcb-loopback-fault-isolation:
    name: Host TCB loopback fault isolation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Exercise unmodified bootstrap cross-device fail-closed semantics
        run: |
          set -Eeuo pipefail
          truncate -s 64M "$RUNNER_TEMP/host-tcb-loopback.img"
          mkfs.ext4 -q "$RUNNER_TEMP/host-tcb-loopback.img"
          mkdir "$RUNNER_TEMP/host-tcb-loopback"
          sudo mount -o loop "$RUNNER_TEMP/host-tcb-loopback.img" "$RUNNER_TEMP/host-tcb-loopback"
          mountpoint -q "$RUNNER_TEMP/host-tcb-loopback"
          trap 'sudo umount "$RUNNER_TEMP/host-tcb-loopback"' EXIT
          stage="$RUNNER_TEMP/host-tcb-stage"
          sudo install -d -o root -g root -m 0755 "$stage"
          sudo install -o root -g root -m 0755 scripts/deploy-production.sh scripts/production-preflight.sh scripts/rollback-production.sh scripts/migration-contract.mjs scripts/deploy-operation-ledger.mjs infra/deploy/peilv-control "$stage/"
          sudo install -o root -g root -m 0440 infra/deploy/peilv-sudoers "$stage/peilv-sudoers"
          sudo install -o root -g root -m 0644 infra/deploy/legacy-sudoers-retirement-v1.sha256 "$stage/legacy-sudoers-retirement-v1.sha256"
          sudo install -o root -g root -m 0644 infra/deploy/trusted-host-tcb-v3.sha256 "$stage/trusted-host-tcb-v3.sha256"
          root="$RUNNER_TEMP/host-tcb-root"
          stage_device="$(stat -c %d "$stage")"
          loopback_device="$(stat -c %d "$RUNNER_TEMP/host-tcb-loopback")"
          test "$stage_device" != "$loopback_device"
          printf 'verified distinct st_dev values: stage=%s loopback=%s\n' "$stage_device" "$loopback_device"
          if sudo env \
            PEILV_GLOBAL_LOCK="$RUNNER_TEMP/host-tcb-global.lock" \
            PEILV_TCB_LOCK="$RUNNER_TEMP/host-tcb.lock" \
            PEILV_TCB_SBIN="$RUNNER_TEMP/host-tcb-loopback/sbin" \
            PEILV_TCB_LIBEXEC="$root/libexec" \
            PEILV_TCB_ETC="$root/etc" \
            PEILV_TCB_SUDOERS="$root/sudoers" \
            PEILV_TCB_STATE_ROOT="$root/state" \
            PEILV_TCB_SUDOERS_MAIN="$root/sudoers-main" \
            bash infra/deploy/bootstrap-deploy-v3.sh "$stage" 2>"$RUNNER_TEMP/cross-device.stderr"; then
            printf 'cross-device bootstrap unexpectedly succeeded\n' >&2; exit 1
          fi
          grep -F 'Cross-device activation forbidden before mutation' "$RUNNER_TEMP/cross-device.stderr"
          test ! -e "$root"
          test ! -e "$RUNNER_TEMP/host-tcb-loopback/sbin"

          loop_stage="$RUNNER_TEMP/host-tcb-loopback/stage"
          loop_root="$RUNNER_TEMP/host-tcb-loopback/root"
          sudo cp -a "$stage" "$loop_stage"
          sudo install -d -o root -g root -m 0755 "$loop_root"
          common_env=(
            PEILV_GLOBAL_LOCK="$RUNNER_TEMP/host-tcb-loopback/global.lock"
            PEILV_TCB_LOCK="$RUNNER_TEMP/host-tcb-loopback/tcb.lock"
            PEILV_TCB_SBIN="$loop_root/sbin"
            PEILV_TCB_LIBEXEC="$loop_root/libexec"
            PEILV_TCB_ETC="$loop_root/etc"
            PEILV_TCB_SUDOERS="$loop_root/sudoers"
            PEILV_TCB_STATE_ROOT="$loop_root/state"
            PEILV_TCB_SUDOERS_MAIN="$loop_root/sudoers-main"
          )
          sudo install -d -o root -g root -m 0755 "$loop_root/sudoers"
          printf '@includedir %s\n' "$loop_root/sudoers" | sudo tee "$loop_root/sudoers-main" >/dev/null
          sudo chown root:root "$loop_root/sudoers-main"; sudo chmod 0440 "$loop_root/sudoers-main"
          if sudo env "${common_env[@]}" PEILV_TCB_FAIL_AFTER=peilv-sudoers bash infra/deploy/bootstrap-deploy-v3.sh "$loop_stage"; then
            printf 'fault-injected bootstrap unexpectedly succeeded\n' >&2; exit 1
          fi
          sudo test -f "$loop_root/state/tcb-v3-activation.json"
          sudo env "${common_env[@]}" bash infra/deploy/bootstrap-deploy-v3.sh recover-tcb-v3 "$loop_stage"
          sudo test ! -e "$loop_root/state/tcb-v3-activation.json"
          sync
