name: Production preflight
run-name: Preflight ${{ inputs.release_id }} · ${{ inputs.request_id }}

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Exact successful main CI run ID
        required: true
        type: string
      source_run_attempt:
        description: Exact CI run attempt
        required: true
        type: string
      source_artifact_id:
        description: Exact immutable candidate artifact ID
        required: true
        type: string
      commit_sha:
        description: Exact candidate commit SHA
        required: true
        type: string
      release_id:
        description: Release ID derived from run, attempt, and commit
        required: true
        type: string
      request_id:
        description: Control-plane request UUID
        required: true
        type: string

permissions:
  contents: read
  actions: read

env:
  SOURCE_RUN_ID: ${{ inputs.source_run_id }}
  SOURCE_RUN_ATTEMPT: ${{ inputs.source_run_attempt }}
  SOURCE_ARTIFACT_ID: ${{ inputs.source_artifact_id }}
  COMMIT_SHA: ${{ inputs.commit_sha }}
  RELEASE_ID: ${{ inputs.release_id }}
  REQUEST_ID: ${{ inputs.request_id }}

concurrency:
  group: peilv-production-preflight
  cancel-in-progress: false

jobs:
  inspect-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Bootstrap guaranteed preflight artifact
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const result = {
            schemaVersion: 1, status: "blocked", phase: "candidate-validation",
            code: "INITIALIZATION_PENDING", exitCode: 1, requestId: null, candidate: null,
            currentRelease: null, checks: [], migrations: null,
            blockers: ["Production preflight has not completed candidate validation"],
            checkedAt: new Date().toISOString(), validUntil: null,
          };
          fs.writeFileSync("preflight-result.json", `${JSON.stringify(result, null, 2)}\n`, { mode: 0o600 });
          fs.writeFileSync("preflight.md", "## Production preflight\n\n- Status: **blocked**\n- Phase: `candidate-validation`\n- Code: `INITIALIZATION_PENDING`\n- Exit code: `1`\n- Blockers: `Production preflight has not completed candidate validation`\n", { mode: 0o600 });
          NODE
      - name: Check out trusted workflow helpers
        id: helper-checkout
        continue-on-error: true
        uses: actions/checkout@v4
      - name: Initialize guaranteed preflight result
        if: steps.helper-checkout.outcome == 'success'
        run: node scripts/preflight-result-v1.mjs blocked candidate-validation INITIALIZATION_PENDING 1 preflight-result.json
      - name: Validate fixed candidate identity
        id: candidate-identity
        if: steps.helper-checkout.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          failure_code=CANDIDATE_INPUT_INVALID
          trap 'status=$?; node scripts/preflight-result-v1.mjs blocked candidate-validation "$failure_code" "$status" preflight-result.json; exit "$status"' ERR
          [[ "$SOURCE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$SOURCE_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          [[ "$SOURCE_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RELEASE_ID" == "r${SOURCE_RUN_ID}-a${SOURCE_RUN_ATTEMPT}-${COMMIT_SHA:0:12}" ]]
          [[ "$REQUEST_ID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]]
          failure_code=SOURCE_RUN_INVALID
          run_json="$(gh api "repos/$GH_REPO/actions/runs/$SOURCE_RUN_ID")"
          RUN_JSON="$run_json" SOURCE_RUN_ATTEMPT="$SOURCE_RUN_ATTEMPT" COMMIT_SHA="$COMMIT_SHA" node - <<'NODE'
          const run = JSON.parse(process.env.RUN_JSON);
          const expected = {
            attempt: Number(process.env.SOURCE_RUN_ATTEMPT),
            sha: process.env.COMMIT_SHA,
          };
          if (run.event !== "push" || run.head_branch !== "main" || run.status !== "completed" || run.conclusion !== "success") {
            throw new Error("Source run is not a successful main push");
          }
          if (run.run_attempt !== expected.attempt || run.head_sha !== expected.sha) {
            throw new Error("Source run identity changed");
          }
          NODE
          failure_code=ARTIFACT_IDENTITY_INVALID
          artifact_json="$(gh api "repos/$GH_REPO/actions/artifacts/$SOURCE_ARTIFACT_ID")"
          ARTIFACT_JSON="$artifact_json" SOURCE_RUN_ID="$SOURCE_RUN_ID" SOURCE_RUN_ATTEMPT="$SOURCE_RUN_ATTEMPT" COMMIT_SHA="$COMMIT_SHA" node - <<'NODE'
          const artifact = JSON.parse(process.env.ARTIFACT_JSON);
          const expectedName = `peilv-candidate-${process.env.SOURCE_RUN_ID}-${process.env.SOURCE_RUN_ATTEMPT}`;
          if (artifact.expired || artifact.name !== expectedName || artifact.workflow_run?.id !== Number(process.env.SOURCE_RUN_ID) || artifact.workflow_run?.head_sha !== process.env.COMMIT_SHA) {
            throw new Error("Candidate artifact identity changed or expired");
          }
          NODE
      - name: Download exact candidate artifact
        id: candidate-download
        if: steps.candidate-identity.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          artifact-ids: ${{ inputs.source_artifact_id }}
          run-id: ${{ inputs.source_run_id }}
          path: release-artifacts
          github-token: ${{ github.token }}
      - name: Record candidate artifact download failure
        if: steps.candidate-identity.outcome == 'success' && steps.candidate-download.outcome != 'success'
        run: node scripts/preflight-result-v1.mjs blocked candidate-validation ARTIFACT_DOWNLOAD_FAILED 1 preflight-result.json
      - name: Cross-check archive and manifests
        id: candidate-validation
        if: steps.candidate-download.outcome == 'success'
        continue-on-error: true
        env:
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          set -Eeuo pipefail
          artifact_name="peilv-candidate-${SOURCE_RUN_ID}-${SOURCE_RUN_ATTEMPT}"
          candidate_dir="release-artifacts/$artifact_name"
          archive="$candidate_dir/peilv-$RELEASE_ID.tar.gz"
          checksum="$archive.sha256"
          external="$candidate_dir/release-manifest-$RELEASE_ID.json"
          failure_code=ARTIFACT_LAYOUT_INVALID
          trap 'status=$?; node scripts/preflight-result-v1.mjs blocked candidate-validation "$failure_code" "$status" preflight-result.json; exit "$status"' ERR
          set +e
          node scripts/validate-artifact-layout.mjs release-artifacts "$artifact_name" \
            "peilv-$RELEASE_ID.tar.gz" "peilv-$RELEASE_ID.tar.gz.sha256" "release-manifest-$RELEASE_ID.json"
          layout_status=$?
          set -e
          if (( layout_status != 0 )); then
            (( layout_status == 21 )) && failure_code=ARTIFACT_CONTENT_MISSING
            exit "$layout_status"
          fi
          failure_code=CHECKSUM_INVALID
          archive_sha="$(sha256sum "$archive" | awk '{print $1}')"
          [[ "$(awk 'NR == 1 {print $1}' "$checksum")" == "$archive_sha" ]]
          [[ "$(awk 'NR == 1 {print $2}' "$checksum")" == "peilv-$RELEASE_ID.tar.gz" || "$(awk 'NR == 1 {print $2}' "$checksum")" == "*peilv-$RELEASE_ID.tar.gz" ]]
          rm -rf verified-release
          mkdir verified-release
          failure_code=MANIFEST_INVALID
          python3 - "$archive" verified-release <<'PY'
          import pathlib
          import tarfile
          import sys

          archive = pathlib.Path(sys.argv[1])
          output = pathlib.Path(sys.argv[2])
          targets = {
              "release-manifest.json": {"release-manifest.json", "./release-manifest.json"},
              "migrations/manifest.json": {"migrations/manifest.json", "./migrations/manifest.json"},
          }
          selected = {target: [] for target in targets}

          with tarfile.open(archive, "r:gz") as value:
              for member in value:
                  name = member.name
                  if not name or not name.isascii() or any(ord(character) < 0x21 or ord(character) > 0x7e for character in name):
                      raise SystemExit("Unsupported archive member name")
                  if "\\" in name or name.startswith("/"):
                      raise SystemExit(f"Unsafe archive member path: {name}")
                  if name in (".", "./") and member.isdir():
                      continue
                  normalized = name
                  while normalized.startswith("./"):
                      normalized = normalized[2:]
                  parts = normalized.rstrip("/").split("/")
                  if not normalized or any(part in ("", ".", "..") for part in parts):
                      raise SystemExit(f"Unsafe archive member path: {name}")
                  for target, allowed_names in targets.items():
                      if name in allowed_names:
                          selected[target].append(member)
                      elif normalized == target or normalized.endswith("/" + target) or normalized.endswith(target):
                          raise SystemExit(f"Ambiguous archive manifest member: {name}")

              for target, members in selected.items():
                  if len(members) != 1:
                      raise SystemExit(f"Archive must contain exactly one allowed {target} member")
                  member = members[0]
                  if not member.isfile() or member.islnk() or member.issym():
                      raise SystemExit(f"Archive manifest member is not a regular file: {member.name}")
                  source = value.extractfile(member)
                  if source is None:
                      raise SystemExit(f"Archive manifest member is unreadable: {member.name}")
                  destination = output / target
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  destination.write_bytes(source.read())
          PY
          EXTERNAL_MANIFEST="$external" INTERNAL_MANIFEST="verified-release/release-manifest.json" MIGRATION_MANIFEST="verified-release/migrations/manifest.json" ARCHIVE_SHA="$archive_sha" RELEASE_ID="$RELEASE_ID" COMMIT_SHA="$COMMIT_SHA" SOURCE_RUN_ID="$SOURCE_RUN_ID" SOURCE_RUN_ATTEMPT="$SOURCE_RUN_ATTEMPT" REPOSITORY="$REPOSITORY" REPOSITORY_ID="$REPOSITORY_ID" node - <<'NODE'
          const fs = require("node:fs");
          const external = JSON.parse(fs.readFileSync(process.env.EXTERNAL_MANIFEST, "utf8"));
          const internal = JSON.parse(fs.readFileSync(process.env.INTERNAL_MANIFEST, "utf8"));
          const migrations = JSON.parse(fs.readFileSync(process.env.MIGRATION_MANIFEST, "utf8"));
          const expected = {
            releaseId: process.env.RELEASE_ID,
            commitSha: process.env.COMMIT_SHA,
            sourceRunId: Number(process.env.SOURCE_RUN_ID),
            sourceRunAttempt: Number(process.env.SOURCE_RUN_ATTEMPT),
            repository: process.env.REPOSITORY,
            repositoryId: Number(process.env.REPOSITORY_ID),
          };
          for (const [key, value] of Object.entries(expected)) {
            if (external[key] !== value || internal[key] !== value) throw new Error(`Manifest ${key} mismatch`);
          }
          if (external.archiveSha256 !== process.env.ARCHIVE_SHA || internal.archiveSha256 !== null) throw new Error("Archive checksum binding mismatch");
          if (external.archiveFile !== `peilv-${expected.releaseId}.tar.gz` || internal.archiveFile !== external.archiveFile) throw new Error("Archive filename binding mismatch");
          if (JSON.stringify(external.migrations) !== JSON.stringify(internal.migrations) || JSON.stringify(internal.migrations) !== JSON.stringify(migrations.migrations)) throw new Error("Migration manifest mismatch");
          if (!Array.isArray(migrations.migrations) || migrations.migrations.length === 0) throw new Error("Migration manifest is empty");
          NODE
          echo "ARCHIVE_SHA=$archive_sha" >> "$GITHUB_ENV"
          echo "CANDIDATE_DIR=$candidate_dir" >> "$GITHUB_ENV"
          migrations="$(node scripts/preflight-result-v1.mjs manifest-migrations "$external")"
          echo "MIGRATIONS=$migrations" >> "$GITHUB_ENV"
          node scripts/preflight-result-v1.mjs blocked ssh-configuration SSH_CONFIGURATION_PENDING 1 preflight-result.json
      - name: Configure restricted preflight SSH
        id: ssh-configuration
        if: steps.candidate-validation.outcome == 'success'
        continue-on-error: true
        env:
          SSH_KEY: ${{ secrets.PROD_AUDIT_SSH_KEY }}
          SSH_HOST_KEY: ${{ secrets.PROD_SSH_HOST_KEY }}
        run: |
          set -Eeuo pipefail
          trap 'status=$?; node scripts/preflight-result-v1.mjs blocked ssh-configuration SSH_CONFIGURATION_FAILED "$status" preflight-result.json; exit "$status"' ERR
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/audit_key
          printf '%s\n' "$SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/audit_key ~/.ssh/known_hosts
      - name: Record SSH configuration failure
        if: steps.candidate-validation.outcome == 'success' && steps.ssh-configuration.outcome != 'success'
        run: node scripts/preflight-result-v1.mjs blocked ssh-configuration SSH_CONFIGURATION_FAILED 1 preflight-result.json
      - name: Run non-disruptive transient production staging
        id: production-inspection
        if: steps.ssh-configuration.outcome == 'success'
        continue-on-error: true
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_AUDIT_USER }}
        run: |
          set -Eeuo pipefail
          artifact_name="peilv-candidate-${SOURCE_RUN_ID}-${SOURCE_RUN_ATTEMPT}"
          candidate_dir="release-artifacts/$artifact_name"
          [[ "$CANDIDATE_DIR" == "$candidate_dir" ]]
          archive="$candidate_dir/peilv-$RELEASE_ID.tar.gz"
          remote_archive="/tmp/peilv-preflight-$REQUEST_ID.tar.gz"
          remote_upload="/tmp/.peilv-preflight-$REQUEST_ID.upload-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          archive_bytes="$(stat -c '%s' "$archive")"
          remote_archive_published=0
          ssh_base=(-i ~/.ssh/audit_key -p "$PROD_PORT" -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=yes)
          cleanup_remote_upload() {
            timeout 30s ssh "${ssh_base[@]}" "$PROD_USER@$PROD_HOST" bash -s -- "$REQUEST_ID" "$remote_upload" "$remote_archive" "$remote_archive_published" <<'CLEANUP' >/dev/null 2>&1 || true
          set -Eeuo pipefail
          request_id="$1"; upload="$2"; archive="$3"; published="$4"
          [[ "$request_id" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]]
          [[ "$upload" == "/tmp/.peilv-preflight-$request_id.upload-"* ]]
          [[ "$archive" == "/tmp/peilv-preflight-$request_id.tar.gz" ]]
          [[ "$published" == 0 || "$published" == 1 ]]
          rm -f -- "$upload"
          if [[ "$published" == 1 ]]; then rm -f -- "$archive"; fi
          CLEANUP
          }
          trap cleanup_remote_upload EXIT HUP INT TERM
          set +e
          timeout 30s ssh "${ssh_base[@]}" "$PROD_USER@$PROD_HOST" bash -s -- "$REQUEST_ID" "$remote_upload" "$remote_archive" "$archive_bytes" <<'CAPACITY' 2>transfer-stderr.log
          set -Eeuo pipefail
          request_id="$1"; upload="$2"; archive="$3"; bytes="$4"
          [[ "$request_id" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]]
          [[ "$upload" == "/tmp/.peilv-preflight-$request_id.upload-"* ]]
          [[ "$archive" == "/tmp/peilv-preflight-$request_id.tar.gz" ]]
          [[ "$bytes" =~ ^[1-9][0-9]*$ ]] && (( bytes <= 1073741824 ))
          [[ ! -e "$upload" && ! -L "$upload" && ! -e "$archive" && ! -L "$archive" ]]
          available="$(df -Pk /tmp | awk 'NR == 2 { print $4 * 1024 }')"
          (( available >= bytes + 67108864 ))
          CAPACITY
          capacity_status=$?
          set -e
          if (( capacity_status != 0 )); then
            cat transfer-stderr.log >&2; rm -f transfer-stderr.log
            code=SSH_TRANSFER_FAILED; (( capacity_status == 124 )) && code=REMOTE_TIMEOUT
            node scripts/preflight-result-v1.mjs blocked production-inspection "$code" "$capacity_status" preflight-result.json
            exit "$capacity_status"
          fi
          rm -f transfer-stderr.log
          set +e
          timeout 90s scp -i ~/.ssh/audit_key -P "$PROD_PORT" -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=yes "$archive" "$PROD_USER@$PROD_HOST:$remote_upload" 2>transfer-stderr.log
          transfer_status=$?
          set -e
          if (( transfer_status != 0 )); then
            cat transfer-stderr.log >&2; rm -f transfer-stderr.log
            code=SSH_TRANSFER_FAILED; (( transfer_status == 124 )) && code=REMOTE_TIMEOUT
            node scripts/preflight-result-v1.mjs blocked production-inspection "$code" "$transfer_status" preflight-result.json
            exit "$transfer_status"
          fi
          rm -f transfer-stderr.log
          set +e
          timeout 30s ssh "${ssh_base[@]}" "$PROD_USER@$PROD_HOST" bash -s -- "$REQUEST_ID" "$remote_upload" "$remote_archive" "$archive_bytes" <<'PUBLISH' 2>transfer-stderr.log
          set -Eeuo pipefail
          request_id="$1"; upload="$2"; archive="$3"; bytes="$4"
          [[ "$request_id" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]]
          [[ "$upload" == "/tmp/.peilv-preflight-$request_id.upload-"* ]]
          [[ "$archive" == "/tmp/peilv-preflight-$request_id.tar.gz" ]]
          [[ "$bytes" =~ ^[1-9][0-9]*$ ]] && (( bytes <= 1073741824 ))
          trap 'rm -f -- "$upload"' EXIT HUP INT TERM
          [[ -f "$upload" && ! -L "$upload" ]]
          IFS='|' read -r file_type owner mode nlink size device < <(stat -c '%F|%U|%a|%h|%s|%d' -- "$upload")
          [[ "$file_type" == "regular file" && "$owner" == peilv-audit && "$mode" =~ ^[0-7]{3,4}$ ]]
          (( (8#$mode & 0022) == 0 ))
          [[ "$nlink" == 1 && "$size" == "$bytes" && "$device" == "$(stat -c '%d' -- /tmp)" ]]
          chmod 0600 -- "$upload"
          ln -- "$upload" "$archive"
          rm -f -- "$upload"
          IFS='|' read -r file_type owner mode nlink size device < <(stat -c '%F|%U|%a|%h|%s|%d' -- "$archive")
          [[ "$file_type" == "regular file" && "$owner" == peilv-audit && "$mode" == 600 ]]
          [[ "$nlink" == 1 && "$size" == "$bytes" && "$device" == "$(stat -c '%d' -- /tmp)" ]]
          trap - EXIT HUP INT TERM
          PUBLISH
          publish_status=$?
          set -e
          if (( publish_status != 0 )); then
            cat transfer-stderr.log >&2; rm -f transfer-stderr.log
            code=SSH_TRANSFER_FAILED; (( publish_status == 124 )) && code=REMOTE_TIMEOUT
            node scripts/preflight-result-v1.mjs blocked production-inspection "$code" "$publish_status" preflight-result.json
            exit "$publish_status"
          fi
          rm -f transfer-stderr.log
          remote_archive_published=1
          : > "$RUNNER_TEMP/peilv-preflight-$REQUEST_ID.published"
          set +e
          timeout 10m ssh "${ssh_base[@]}" \
            -o BatchMode=yes -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=yes \
            "$PROD_USER@$PROD_HOST" \
            bash -s -- "$RELEASE_ID" "$COMMIT_SHA" "$SOURCE_RUN_ID" "$SOURCE_RUN_ATTEMPT" "$SOURCE_ARTIFACT_ID" "$ARCHIVE_SHA" "$REQUEST_ID" "$MIGRATIONS" "$remote_archive" <<'REMOTE' > remote-preflight.json 2>remote-stderr.log
          set -Eeuo pipefail
          for _ in {1..90}; do
            status=0
            stderr_file="$(mktemp)"
            output="$(sudo -n /usr/local/sbin/peilv-control preflight "$1" "$2" "$3" "$4" "$5" "$6" "$7" "$8" "$9" 2>"$stderr_file")" || status=$?
            if (( status == 0 )); then
              cat "$stderr_file" >&2; rm -f "$stderr_file"
              printf '%s\n' "$output"
              exit 0
            fi
            if grep -Fxq 'A peilv systemd job is currently running' "$stderr_file"; then
              rm -f "$stderr_file"
              sleep 5
              continue
            fi
            cat "$stderr_file" >&2; rm -f "$stderr_file"
            exit "$status"
          done
          printf 'Timed out waiting for peilv systemd jobs to finish\n' >&2
          exit 124
          REMOTE
          remote_status=$?
          printf '%s\n' "$remote_status" > "$RUNNER_TEMP/peilv-preflight-$REQUEST_ID.exit-status"
          set -e
          cleanup_remote_upload
          trap - EXIT HUP INT TERM
          cat remote-stderr.log >&2; rm -f remote-stderr.log
          if (( remote_status == 124 )); then
            node scripts/preflight-result-v1.mjs blocked production-inspection REMOTE_TIMEOUT 124 preflight-result.json
            exit 124
          fi
          if (( remote_status != 0 )); then
            node scripts/preflight-result-v1.mjs blocked production-inspection REMOTE_COMMAND_FAILED "$remote_status" preflight-result.json
            exit "$remote_status"
          fi
          if ! node -e 'const fs=require("node:fs"),path=require("node:path");JSON.parse(fs.readFileSync(path.resolve(process.argv[1]),"utf8"))' remote-preflight.json; then
            node scripts/preflight-result-v1.mjs blocked production-inspection REMOTE_NON_JSON 1 preflight-result.json
            exit 1
          fi
          if ! node scripts/preflight-result-v1.mjs normalize-remote remote-preflight.json preflight-result.json; then
            node scripts/preflight-result-v1.mjs blocked production-inspection RESULT_INVALID 1 preflight-result.json
            exit 1
          fi
          node scripts/preflight-result-v1.mjs validate preflight-result.json
          status="$(node -e 'const fs=require("node:fs"),path=require("node:path");const r=JSON.parse(fs.readFileSync(path.resolve("preflight-result.json"),"utf8"));process.stdout.write(r.status)')"
          [[ "$status" == passed ]] || exit 2
      - name: Secondary cleanup of transient production staging
        if: always() && steps.ssh-configuration.outcome == 'success'
        continue-on-error: true
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_AUDIT_USER }}
        run: |
          set -Eeuo pipefail
          remote_upload="/tmp/.peilv-preflight-$REQUEST_ID.upload-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          remote_archive="/tmp/peilv-preflight-$REQUEST_ID.tar.gz"
          published=0
          [[ ! -f "$RUNNER_TEMP/peilv-preflight-$REQUEST_ID.published" ]] || published=1
          timeout 30s ssh -i ~/.ssh/audit_key -p "$PROD_PORT" -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=yes \
            "$PROD_USER@$PROD_HOST" bash -s -- "$REQUEST_ID" "$remote_upload" "$remote_archive" "$published" <<'CLEANUP'
          set -Eeuo pipefail
          request_id="$1"; upload="$2"; archive="$3"; published="$4"
          [[ "$request_id" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]]
          [[ "$upload" == "/tmp/.peilv-preflight-$request_id.upload-"* ]]
          [[ "$archive" == "/tmp/peilv-preflight-$request_id.tar.gz" ]]
          [[ "$published" == 0 || "$published" == 1 ]]
          rm -f -- "$upload"
          if [[ "$published" == 1 ]]; then rm -f -- "$archive"; fi
          CLEANUP
      - name: Finalize preflight report
        if: always()
        run: |
          set -Eeuo pipefail
          if [[ -f scripts/preflight-result-v1.mjs ]]; then
            if ! node scripts/preflight-result-v1.mjs validate preflight-result.json; then
              node scripts/preflight-result-v1.mjs blocked production-inspection RESULT_INVALID 1 preflight-result.json
            fi
            node scripts/preflight-result-v1.mjs render preflight-result.json preflight.md
          fi
          [[ -s preflight-result.json && -s preflight.md ]]
          cat preflight.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload structured preflight result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-result-${{ inputs.request_id }}
          path: |
            preflight-result.json
            preflight.md
          if-no-files-found: error
          retention-days: 30
      - name: Preserve blocked or failed job conclusion
        if: always()
        run: |
          node -e 'const fs=require("node:fs"),path=require("node:path");const r=JSON.parse(fs.readFileSync(path.resolve("preflight-result.json"),"utf8"));if(r.schemaVersion!==1||r.status!=="passed")process.exit(1)'
