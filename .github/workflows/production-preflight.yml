name: Production preflight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: peilv-production-preflight
  cancel-in-progress: false

jobs:
  build-and-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_sha: ${{ steps.release.outputs.release_sha }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - id: commit
        run: |
          git fetch origin main --depth=1
          commit_sha="$(git rev-parse HEAD)"
          [[ "$commit_sha" == "$(git rev-parse origin/main)" ]]
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify and build
        run: |
          pnpm exec vitest run
          pnpm ts-check
          pnpm lint
          pnpm build
          node --check dist/server.js
      - id: release
        name: Create release
        run: |
          release_id="$(date -u +%Y%m%dT%H%M%SZ)"
          bash scripts/create-release.sh "$release_id"
          archive="release-artifacts/peilv-$release_id.tar.gz"
          checksum="$archive.sha256"
          bash scripts/verify-release.sh "$archive" "$checksum"
          release_sha="$(sed -n '1{s/ .*//;p;}' "$checksum")"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
      - name: Configure read-only SSH
        env:
          SSH_KEY: ${{ secrets.PROD_AUDIT_SSH_KEY }}
          SSH_HOST_KEY: ${{ secrets.PROD_SSH_HOST_KEY }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/audit_key
          printf '%s\n' "$SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/audit_key ~/.ssh/known_hosts
      - name: Inspect production without changes
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_AUDIT_USER }}
        run: |
          archive="release-artifacts/peilv-$RELEASE_ID.tar.gz"
          [[ "$(sha256sum "$archive" | awk '{print $1}')" == "$RELEASE_SHA" ]]
          migrations=''
          while IFS= read -r member; do
            member="${member#./}"
            [[ "$member" == migrations/*.sql ]] || continue
            name="${member##*/}"
            version="$(tar -xOzf "$archive" "$member" | sed -n '/INSERT INTO schema_migrations(version, description)/,/ON CONFLICT/p' | sed -nE "0,/^[[:space:]]*'([^']+)'[[:space:]]*,?[[:space:]]*$/s//\\1/p" | head -n 1)"
            migrations="${migrations:+$migrations,}$name=$version"
          done < <(tar -tzf "$archive")
          ssh -i ~/.ssh/audit_key -p "$PROD_PORT" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$PROD_USER@$PROD_HOST" \
            "sudo /usr/local/sbin/peilv-control preflight '$RELEASE_ID' '$migrations'" \
            | tee preflight.md
          cat preflight.md >> "$GITHUB_STEP_SUMMARY"
          {
            printf '\n## If you approve this preflight\n\n'
            printf -- '- Run workflow: `Deploy approved production`\n'
            printf -- '- Use release ID: `%s`\n' "$RELEASE_ID"
            printf -- '- Use release SHA-256: `%s`\n' "$RELEASE_SHA"
            printf -- '- Commit: `%s`\n' '${{ steps.commit.outputs.commit_sha }}'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: production-${{ steps.release.outputs.release_id }}
          path: |
            release-artifacts/peilv-${{ steps.release.outputs.release_id }}.tar.gz
            release-artifacts/peilv-${{ steps.release.outputs.release_id }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: preflight-${{ steps.release.outputs.release_id }}
          path: preflight.md
          retention-days: 14
