# Included from OpenResty's http context. OpenResty terminates TLS; the app is loopback-only.
map "$request_method:$uri" $peilv_admin_auth_strict_key {
    default "";
    ~^(POST|DELETE):/api/auth/session$ $binary_remote_addr;
    ~^POST:/api/auth/bootstrap$ $binary_remote_addr;
}
map "$request_method:$uri" $peilv_admin_auth_probe_key {
    default "";
    ~^(GET|HEAD):/api/auth/session$ $binary_remote_addr;
}
map "$request_method:$uri" $peilv_session_method_allowed {
    default 0;
    ~^(GET|HEAD|POST|DELETE):/api/auth/session$ 1;
}
map "$request_method:$uri" $peilv_bootstrap_method_allowed {
    default 0;
    ~^POST:/api/auth/bootstrap$ 1;
}
limit_req_zone $peilv_admin_auth_strict_key zone=peilv_admin_auth_strict_rate:1m rate=6r/m;
limit_conn_zone $peilv_admin_auth_strict_key zone=peilv_admin_auth_strict_conn:1m;
limit_req_zone $peilv_admin_auth_probe_key zone=peilv_admin_auth_probe_rate:1m rate=120r/m;
limit_conn_zone $peilv_admin_auth_probe_key zone=peilv_admin_auth_probe_conn:1m;

server {
    listen 80;
    server_name _;
    return 444;
}

server {
    listen 80;
    server_name __PEILV_PUBLIC_HOST__;
    return 301 https://__PEILV_PUBLIC_HOST__$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /etc/peilv/tls/fullchain.pem;
    ssl_certificate_key /etc/peilv/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 444;
}

server {
    listen 443 ssl;
    http2 on;
    server_name __PEILV_PUBLIC_HOST__;
    ssl_certificate /etc/peilv/tls/fullchain.pem;
    ssl_certificate_key /etc/peilv/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:peilv_tls:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 1m;

    location = /_ops/secure-cookie-probe {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        add_header Cache-Control "no-store" always;
        add_header Set-Cookie "peilv_tls_probe=1; Max-Age=5; Path=/; Secure; HttpOnly; SameSite=Strict" always;
        return 204;
    }

    location = /api/auth/session {
        if ($peilv_session_method_allowed = 0) { return 405; }
        client_max_body_size 16k;
        client_body_timeout 5s;
        limit_req zone=peilv_admin_auth_strict_rate burst=3 nodelay;
        limit_conn peilv_admin_auth_strict_conn 2;
        limit_req zone=peilv_admin_auth_probe_rate burst=30 nodelay;
        limit_conn peilv_admin_auth_probe_conn 10;
        limit_req_status 429;
        limit_conn_status 429;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host __PEILV_PUBLIC_HOST__;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Forwarded "for=$remote_addr;proto=https";
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/auth/bootstrap {
        if ($peilv_bootstrap_method_allowed = 0) { return 405; }
        client_max_body_size 16k;
        client_body_timeout 5s;
        limit_req zone=peilv_admin_auth_strict_rate burst=3 nodelay;
        limit_conn peilv_admin_auth_strict_conn 2;
        limit_req_status 429;
        limit_conn_status 429;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host __PEILV_PUBLIC_HOST__;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Forwarded "for=$remote_addr;proto=https";
        proxy_set_header X-Forwarded-Proto https;
    }

        location ^~ /api/analysis {
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 180s;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

location / {
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host __PEILV_PUBLIC_HOST__;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Forwarded "for=$remote_addr;proto=https";
        proxy_set_header X-Forwarded-Proto https;
    }
}
