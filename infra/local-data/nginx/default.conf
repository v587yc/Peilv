server {
    listen 8080;
    server_name _;

    location = /rest/v1 {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
    }

    location /rest/v1/ {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
